apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: duniversity-route
  namespace: pavi-ns
spec:
  parentRefs:
  - name: duniversity-gateway 
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: duniversity-service
      port: 80