apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: duniversity-route
  namespace: duniversity-ns
spec:
  parentRefs:
  - name: duniversity-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
    backendRefs:
    - name: backend-service
      port: 80