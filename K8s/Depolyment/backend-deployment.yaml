apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-db
  namespace: duniversity-ns
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels: 
        app: mysql
    spec:
      containers:
      - name: backend-cont
        image: mariadb
        ports:
        - containerPort: 3306
        resources:
          limits:
            memory: "512Mi"
            cpu: "200m"
          requests:
            memory: "256Mi"
            cpu: "100m"
        envFrom:
        - configMapRef:
            name: duniversity-config 
        - secretRef:
            name: duniversity-secret

    