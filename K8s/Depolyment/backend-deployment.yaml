apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-db
  namespace: duniversity-ns
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels: 
        app: mysql
    spec:
      securityContext:
        fsGroup: 999
      containers:
      - name: mysql-cont   # 🔥 renamed (better clarity)
        image: mariadb
        ports:
        - containerPort: 3306

        resources:
          limits:
            memory: "512Mi"
            cpu: "200m"
          requests:
            memory: "256Mi"
            cpu: "100m"

        # ✅ IMPORTANT: MySQL required env
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD

        # ❌ REMOVE old envFrom (not needed for DB init)
        # envFrom:
        # - configMapRef:
        #     name: duniversity-config 
        # - secretRef:
        #     name: duniversity-secret

        volumeMounts:
        # ✅ DB storage
        - name: mysql-storage
          mountPath: /var/lib/mysql

        # 🔥 NEW: init SQL script mount
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d

      volumes:
      # ✅ PVC (NFS storage)
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: mysql-pvc

      # 🔥 NEW: ConfigMap for SQL
      - name: init-script
        configMap:
          name: mysql-init-script