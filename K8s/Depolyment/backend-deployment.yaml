apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-db
  namespace: duniversity-ns
spec:
  replicas: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels: 
        app: mysql
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: mysql-cont   
        image: mariadb
        ports:
        - containerPort: 3306

        resources:
          limits:
            memory: "512Mi"
            cpu: "200m"
          requests:
            memory: "256Mi"
            cpu: "100m"

    
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD

        
        # envFrom:
        # - configMapRef:
        #     name: duniversity-config 
        # - secretRef:
        #     name: duniversity-secret

        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d

      volumeClaimTemplates:
      - metadata:
          name: mysql-vct
        spec:
          storageClassName: university-storage
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
      
      # - name: mysql-storage
      #   persistentVolumeClaim:
      #     claimName: mysql-pvc
      volumes:
      - name: init-script
        configMap:
          name: mysql-init-script