apiVersion: apps/v1
kind: Deployment
metadata:
  name: duniversity
  namespace: pavi-ns
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: duniversity-app
  template:
    metadata:
      labels:
        app: duniversity-app
    spec:
      # affinity:
      #   podAntiAffinity:
      #     preferredDuringSchedulingIgnoredDuringExecution:
      #     - weight: 100
      #       podAffinityTerm:
      #         labelSelector:
      #           matchLabels:
      #             app: frontend
      #         topologyKey: kubernetes.io/hostname
      tolerations:
      - key: "key1"
        operator: "Equal"
        value: "project"
        effect: "NoSchedule"
      containers:
        - name: dunivesrity-cont
          image: pavithrasambath2003/duniversity:v1
          ports:
            - containerPort: 3000
          # resources:
          #   limits:
          #     cpu: "200m"
          #     memory: "512Mi"
          #   requests:
          #     cpu: "100m"
          #     memory: "256Mi"   

