      #     - configMapRef:
      #         name: duniversity-config 
      #     - secretRef:
      #         name: duniversity-secret

      #   volumeMounts:
      #   - name: mysql-storage
      #     mountPath: /var/lib/mysql
      #   - name: init-script
      #     mountPath: /docker-entrypoint-initdb.d

